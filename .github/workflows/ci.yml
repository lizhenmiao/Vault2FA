name: CI

on:
  push:
    branches:
      - main
      - master
      - develop
  pull_request:
    branches:
      - main
      - master
      - develop

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: web/package-lock.json

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: 'stable'
          cache: true
          cache-dependency-path: server/go.sum

      - name: Enable Go toolchain auto-download
        run: echo "GOTOOLCHAIN=auto" >> $GITHUB_ENV

      - name: Install frontend dependencies
        run: |
          cd web
          npm ci

      - name: Install backend dependencies
        run: |
          cd server
          go mod download

      - name: Run frontend tests
        run: |
          cd web
          npm run test

      - name: Build frontend (required for Go embed)
        run: |
          cd web
          npm run build
          cd ..
          rm -rf server/static
          cp -r web/dist server/static

      - name: Run backend tests
        run: |
          cd server
          go test -v ./...

      - name: Build backend
        run: |
          cd server
          go build -o ../dist/vault2fa main.go

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: vault2fa-linux-amd64
          path: dist/vault2fa
          retention-days: 1
