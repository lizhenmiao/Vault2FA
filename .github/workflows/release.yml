name: Build and Release

on:
  push:
    tags:
      - 'v*'  # 当推送 v* 标签时触发（如 v1.0.0）
  workflow_dispatch:  # 允许手动触发

jobs:
  build:
    name: Build for ${{ matrix.goos }}-${{ matrix.goarch }}
    runs-on: ${{ matrix.os }}

    strategy:
      matrix:
        include:
          # Linux AMD64
          - os: ubuntu-latest
            goos: linux
            goarch: amd64
            output: vault2fa-linux-amd64

          # Linux ARM64
          - os: ubuntu-latest
            goos: linux
            goarch: arm64
            output: vault2fa-linux-arm64

          # Windows AMD64
          - os: ubuntu-latest
            goos: windows
            goarch: amd64
            output: vault2fa-windows-amd64.exe

          # macOS AMD64 (Intel)
          - os: macos-latest
            goos: darwin
            goarch: amd64
            output: vault2fa-darwin-amd64

          # macOS ARM64 (Apple Silicon)
          - os: macos-latest
            goos: darwin
            goarch: arm64
            output: vault2fa-darwin-arm64

          # FreeBSD AMD64
          - os: ubuntu-latest
            goos: freebsd
            goarch: amd64
            output: vault2fa-freebsd-amd64

          # FreeBSD ARM64
          - os: ubuntu-latest
            goos: freebsd
            goarch: arm64
            output: vault2fa-freebsd-arm64

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: web/package-lock.json

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: 'stable'
          cache: true
          cache-dependency-path: server/go.sum

      - name: Enable Go toolchain auto-download
        run: echo "GOTOOLCHAIN=auto" >> $GITHUB_ENV

      - name: Build frontend
        run: |
          cd web
          npm ci
          npm run build
          cd ..
          rm -rf server/static
          cp -r web/dist server/static

      - name: Build backend
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          mkdir -p dist
          cd server
          go build -ldflags="-s -w" -o ../dist/${{ matrix.output }} main.go

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.output }}
          path: dist/${{ matrix.output }}
          retention-days: 7

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Display structure
        run: ls -R dist

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: dist/*/**
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
